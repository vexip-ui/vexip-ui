name: Deploy Docs

on:
  workflow_dispatch:
  push:
    tags:
      - v*

jobs:
  deploy-docs:
    if: github.repository == 'vexip-ui/vexip-ui'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Deploy
        run: pnpm run deploy:docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
